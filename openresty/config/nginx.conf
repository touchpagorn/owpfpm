worker_processes auto;
#pid             logs/nginx.pid;
user            www-data;

events { worker_connections  200000; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log logs/access.log main;
    error_log  logs/error.log;

    sendfile on;
    keepalive_timeout 60;

    gzip on;
    gzip_types image/gif text/plain text/css image/x-icon application/x-perl application/x-httpd-cgi application/x-javascript text/javascript image/png image/x-ms-bmp application/x-font-ttf application/vnd.ms-fontobject application/font-woff font/opentype font/ttf;
    gzip_vary on;

    large_client_header_buffers 4 8k;
    client_header_buffer_size 1k;
    client_max_body_size 512M;
    client_body_buffer_size 128k;
    proxy_headers_hash_max_size 512;
    proxy_headers_hash_bucket_size 256;
    server_names_hash_bucket_size 64;
    proxy_buffers 4 256k;
    proxy_buffer_size 128k;
    proxy_busy_buffers_size 256k;
    lua_package_path "/opt/openresty/lualib/?.lua;;";
    
    include /opt/openresty/nginx/conf/owpfpm/security_headers.conf;
    include /opt/openresty/nginx/conf/owpfpm/ssl_enabled.conf;

    # Rate limiting zone for WordPress login and XML-RPC to prevent brute force
    limit_req_zone $binary_remote_addr zone=wp_login:10m rate=2r/s;

    # 1. ทำ Dynamic Whitelist (อนุญาตเฉพาะโดเมนของตัวเอง ไม่ว่าจะย้ายไปเครื่องไหน)
    map $http_origin $cors_allowed_origin {
        default "";
        # ตรวจสอบว่า Origin ที่ส่งมา ตรงกับ Host (โดเมน+พอร์ต) ที่กำลังถูกเรียกอยู่หรือไม่
        "~^https?://$http_host$" "$http_origin";
    }

    # 🔁 HTTP redirect to HTTPS
    server {
        listen 80 default_server;
        server_name _;
        root /var/www/html;
        index index.html;
        return 301 https://$host$request_uri;
    }

    # 🔐 HTTPS server block
    server {
        listen 443 ssl default_server;
        http2 on; # 💡 แยกคำสั่งเปิด HTTP/2
        server_name _;

        root /var/www/html;
        index index.php index.html;

        charset utf-8;
        log_not_found off;

        client_header_timeout   15;
        client_body_timeout     15;
        fastcgi_read_timeout    360;
        keepalive_timeout       60;
        proxy_ignore_client_abort on;
        send_timeout            60;
        lingering_timeout       5;

        # Restrict dangerous HTTP methods (TRACE, CONNECT, etc.)
        if ($request_method !~ ^(GET|POST|HEAD|OPTIONS|PUT|DELETE)$ ) {
            return 405;
        }

        location / {
            more_clear_headers 'Server:';
            more_clear_headers 'X-Powered-By:';

            # ใส่ Header CORS (ถ้าระบบเช็คแล้วว่าไม่ใช่ Origin ที่อนุญาต มันจะส่งค่าว่าง ซึ่ง Browser จะบล็อกข้ามโดเมนให้เองโดยอัตโนมัติ)
            add_header 'Access-Control-Allow-Origin' $cors_allowed_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;

            # จัดการ Preflight Requests (OPTIONS) เพื่อไม่ให้กระทบกับหน้าปกติ
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_allowed_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            try_files $uri $uri/ /index.php$is_args$args;
        }

        location = /favicon.ico {
            log_not_found off;
        }

        # Apply rate limiting to login page and XML-RPC endpoint to prevent brute-force attacks
        location ~* ^/(wp-login\.php|xmlrpc\.php)$ {
            limit_req zone=wp_login burst=5 nodelay;
            
            more_clear_headers 'Server:';
            more_clear_headers 'X-Powered-By:';
            
            include fastcgi.conf;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PHP_VALUE "upload_max_filesize=512M\npost_max_size=512M\nmemory_limit=512M\ndate.timezone=Asia/Bangkok";
            fastcgi_read_timeout 180s;
            fastcgi_send_timeout 180s;
            fastcgi_connect_timeout 1200s;
            fastcgi_intercept_errors on;
            fastcgi_pass php-fpm:9000;
            fastcgi_max_temp_file_size 0;
        }

        location ~ \.php$ {
            more_clear_headers 'Server:';
            more_clear_headers 'X-Powered-By:';

            # ใส่ Header CORS ในบล็อก PHP ด้วยเพื่อให้พวก WordPress AJAX หรือหน้าล็อกอินทำงานได้ราบรื่น
            add_header 'Access-Control-Allow-Origin' $cors_allowed_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;

            include fastcgi.conf;
            include fastcgi_params;
            
            # บังคับระบุพิกัดไฟล์ให้แม่นยำเพื่อป้องกันความสับสนของแอปพลิเคชัน
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            fastcgi_param PHP_VALUE "upload_max_filesize=512M\npost_max_size=512M\nmemory_limit=512M\ndate.timezone=Asia/Bangkok";
            fastcgi_read_timeout 180s;
            fastcgi_send_timeout 180s;
            fastcgi_connect_timeout 1200s;
            fastcgi_intercept_errors on;
            fastcgi_pass php-fpm:9000;
            fastcgi_max_temp_file_size 0;
        }
    }
}